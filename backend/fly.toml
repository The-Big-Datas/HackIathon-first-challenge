# Fly.io app config. Rename `app` if "preauth-backend" is taken; the same
# value goes into Streamlit's BACKEND_URL secret as https://<app>.fly.dev.
app = "preauth-backend"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  CLAUDE_MODEL = "claude-sonnet-4-6"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
